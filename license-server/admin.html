<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TGMatrix 卡密后台</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08101d;
        --panel: rgba(15, 23, 42, 0.82);
        --panel-2: rgba(2, 6, 23, 0.5);
        --line: rgba(255, 255, 255, 0.08);
        --text: #e5eefb;
        --muted: #8ea0bf;
        --primary: #38bdf8;
        --danger: #fb7185;
        --warn: #f59e0b;
        --ok: #34d399;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(56,189,248,.12), transparent 28%), var(--bg);
        color: var(--text);
        font: 14px/1.45 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .page { max-width: 1080px; margin: 0 auto; padding: 24px; }
      .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 18px;
        backdrop-filter: blur(14px);
        box-shadow: 0 20px 60px rgba(0,0,0,.24);
      }
      .hero { padding: 22px; }
      .title { font-size: 28px; font-weight: 700; }
      .muted { color: var(--muted); }
      .hero-top, .row, .top-actions, .card-head, .summary { display:flex; gap:12px; flex-wrap:wrap; }
      .hero-top { justify-content: space-between; align-items: center; }
      .badge {
        display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px;
        background: rgba(56,189,248,.12); color:#bce8ff; font-size: 12px;
      }
      .layout { margin-top: 18px; display: grid; gap: 18px; }
      .card { padding: 18px; }
      .step {
        display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px;
        border-radius:999px; background: rgba(56,189,248,.14); color:#bce8ff; font-weight:700; font-size:12px;
      }
      .card-title { font-size: 18px; font-weight: 700; }
      .field { display:flex; flex-direction:column; gap:8px; flex:1; min-width: 0; }
      .field.small { flex: 0 0 160px; }
      label { color: var(--muted); font-size: 12px; }
      input, textarea {
        width:100%; border:1px solid var(--line); background: rgba(2,6,23,.55); color: var(--text);
        border-radius: 12px; padding: 11px 12px; outline: none;
      }
      textarea { min-height: 84px; resize: vertical; }
      button {
        border:0; border-radius: 12px; padding: 11px 14px; cursor:pointer; color:white;
        background: var(--primary); font-weight: 600;
      }
      button.secondary { background: rgba(255,255,255,.06); border:1px solid var(--line); }
      button.warn { background: var(--warn); color:#2a1a00; }
      button.danger { background: var(--danger); }
      button.ok { background: var(--ok); color:#05291f; }
      button:disabled { opacity:.55; cursor:not-allowed; }
      .actions { display:flex; gap:10px; flex-wrap:wrap; }
      .quick-grid { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: 14px; }
      .quick-box {
        border:1px solid var(--line); border-radius: 14px; background: var(--panel-2);
        padding: 14px;
      }
      .quick-label { color: var(--muted); font-size: 12px; }
      .quick-value { margin-top: 8px; font-size: 16px; font-weight: 700; word-break: break-all; }
      .notice, .error { padding:12px 14px; border-radius:12px; margin-top:12px; }
      .notice { background: rgba(52,211,153,.12); color:#bff7e0; border:1px solid rgba(52,211,153,.18); }
      .error { background: rgba(251,113,133,.12); color:#ffd3db; border:1px solid rgba(251,113,133,.18); }
      .list {
        margin-top: 14px; display:flex; flex-direction:column; gap:10px;
        max-height: 420px; overflow:auto;
      }
      .item {
        border:1px solid var(--line); border-radius: 14px; background: var(--panel-2);
        padding: 14px; cursor:pointer; transition: .15s ease;
      }
      .item:hover { background: rgba(255,255,255,.04); }
      .item.active { border-color: rgba(56,189,248,.35); background: rgba(56,189,248,.08); }
      .item-head {
        display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;
      }
      .item-title { font-size: 15px; font-weight: 700; }
      .status { font-weight:700; }
      .status.active { color:#c4fce8; }
      .status.disabled { color:#ffd4dc; }
      .status.expired { color:#ffe3a5; }
      .item-meta {
        display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:10px; margin-top: 10px;
      }
      .item-meta div {
        border:1px solid var(--line); border-radius: 12px; padding: 10px 12px; background: rgba(255,255,255,.02);
      }
      .item-meta span { display:block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
      .empty {
        border:1px dashed var(--line); border-radius: 14px; padding: 18px; color: var(--muted); text-align:center;
      }
      details.more {
        margin-top: 14px; border:1px solid var(--line); border-radius: 14px; background: var(--panel-2);
        padding: 12px 14px;
      }
      details.more summary { cursor:pointer; color:#c7d8f3; font-weight:600; }
      .kv { display:grid; grid-template-columns: 120px 1fr; gap:8px 12px; margin-top: 14px; }
      .log-list { margin-top: 14px; display:flex; flex-direction:column; gap:10px; max-height: 280px; overflow:auto; }
      .log-item { border:1px solid var(--line); border-radius: 12px; padding: 12px; background: rgba(2,6,23,.42); }
      code { color:#d8edff; }
      @media (max-width: 860px) {
        .quick-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .item-meta { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .page { padding: 16px; }
        .quick-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="panel hero">
        <div class="hero-top">
          <div>
            <div class="muted">TGMatrix</div>
            <div class="title">卡密管理后台</div>
            <div class="muted" style="margin-top:8px">按下面 3 步走就行：先登录后台，再创建卡密，最后在下方找到卡密做延期 / 重置设备 / 禁用。</div>
          </div>
          <div class="badge" id="healthBadge">正在连接服务</div>
        </div>
      </div>

      <div class="layout">
        <div class="panel card">
          <div class="card-head">
            <div class="step">1</div>
            <div>
              <div class="card-title">先登录后台</div>
              <div class="muted" style="margin-top:4px">本地默认管理员口令是 <code>dev-admin-token</code>。</div>
            </div>
          </div>
          <div class="row" style="margin-top:14px; align-items:end;">
            <div class="field">
              <label>管理员 Token</label>
              <input id="adminToken" placeholder="请输入管理员 token" />
            </div>
            <div class="actions">
              <button id="saveTokenBtn" class="secondary">保存口令</button>
              <button id="checkTokenBtn">进入后台</button>
            </div>
          </div>
          <div id="authMessage"></div>
        </div>

        <div class="panel card">
          <div class="card-head">
            <div class="step">2</div>
            <div>
              <div class="card-title">创建卡密</div>
              <div class="muted" style="margin-top:4px">最常用就是：30 天、1 台设备、创建 1 张。</div>
            </div>
          </div>
          <div class="row" style="margin-top:14px;">
            <div class="field small">
              <label>有效期（天）</label>
              <input id="createDays" type="number" min="1" value="30" />
            </div>
            <div class="field small">
              <label>设备上限</label>
              <input id="createDevices" type="number" min="1" value="1" />
            </div>
            <div class="field">
              <label>备注（选填）</label>
              <input id="createNote" placeholder="例如：张三 / 月卡 / 代理版" />
            </div>
          </div>
          <div class="actions" style="margin-top:14px;">
            <button id="createBtn">生成 1 张随机 24 位字母数字卡密</button>
          </div>

          <div style="height:1px;background:var(--line);margin:18px 0"></div>

          <div class="row">
            <div class="field small">
              <label>生成数量</label>
              <input id="batchCount" type="number" min="1" max="500" value="10" />
            </div>
            <div class="actions" style="align-self:end;">
              <button id="batchCreateBtn" class="warn">批量生成随机 24 位字母数字卡密</button>
            </div>
          </div>

          <div class="field" style="margin-top:14px;">
            <label>本次生成结果（24 位大写字母 + 数字混合，直接复制发给客户）</label>
            <textarea id="batchResult" readonly placeholder="生成后的 24 位随机字母数字卡密会显示在这里"></textarea>
          </div>
          <div id="actionMessage"></div>
        </div>

        <div class="panel card">
          <div class="card-head">
            <div class="step">3</div>
            <div>
              <div class="card-title">管理已有卡密</div>
              <div class="muted" style="margin-top:4px">先点下面某一张卡密，再用右侧按钮做延期、重置设备、禁用或启用。</div>
            </div>
          </div>

          <div class="quick-grid">
            <div class="quick-box">
              <div class="quick-label">当前选中卡密</div>
              <div class="quick-value" id="summaryCardKey">未选择</div>
            </div>
            <div class="quick-box">
              <div class="quick-label">当前状态</div>
              <div class="quick-value" id="summaryStatus">—</div>
            </div>
            <div class="quick-box">
              <div class="quick-label">到期时间</div>
              <div class="quick-value" id="summaryExpireAt">—</div>
            </div>
            <div class="quick-box">
              <div class="quick-label">已绑设备</div>
              <div class="quick-value" id="summaryDevices">—</div>
            </div>
          </div>

          <div class="row" style="margin-top:14px; align-items:end;">
            <div class="field small">
              <label>延期天数</label>
              <input id="extendDays" type="number" min="1" value="30" />
            </div>
            <div class="field">
              <label>备注（选填）</label>
              <input id="actionNote" placeholder="例如：续费 30 天 / 客户换电脑" />
            </div>
          </div>

          <div class="actions" style="margin-top:14px;">
            <button id="extendBtn" class="warn">延期</button>
            <button id="resetDevicesBtn" class="secondary">重置设备</button>
            <button id="disableBtn" class="danger">禁用卡密</button>
            <button id="enableBtn" class="ok">启用卡密</button>
            <button id="refreshBtn" class="secondary">刷新当前卡密</button>
            <button id="loadCardsBtn" class="secondary">刷新列表</button>
          </div>

          <div class="list" id="cardsList">
            <div class="empty">还没有卡密</div>
          </div>

          <details class="more">
            <summary>更多信息（可选）</summary>
            <div class="kv" id="detailBox"></div>
            <div class="log-list" id="deviceList"></div>
            <div class="actions" style="margin-top:14px;">
              <button id="loadLogsBtn" class="secondary">刷新日志</button>
            </div>
            <div class="log-list" id="logList"></div>
          </details>
        </div>
      </div>
    </div>

    <script>
      const state = {
        token: localStorage.getItem('license_admin_token') || 'dev-admin-token',
        selectedCardKey: '',
        cards: []
      }

      const els = {
        healthBadge: document.getElementById('healthBadge'),
        adminToken: document.getElementById('adminToken'),
        saveTokenBtn: document.getElementById('saveTokenBtn'),
        checkTokenBtn: document.getElementById('checkTokenBtn'),
        authMessage: document.getElementById('authMessage'),
        createDays: document.getElementById('createDays'),
        createDevices: document.getElementById('createDevices'),
        createNote: document.getElementById('createNote'),
        createBtn: document.getElementById('createBtn'),
        batchCount: document.getElementById('batchCount'),
        batchCreateBtn: document.getElementById('batchCreateBtn'),
        batchResult: document.getElementById('batchResult'),
        extendDays: document.getElementById('extendDays'),
        actionNote: document.getElementById('actionNote'),
        actionMessage: document.getElementById('actionMessage'),
        extendBtn: document.getElementById('extendBtn'),
        resetDevicesBtn: document.getElementById('resetDevicesBtn'),
        disableBtn: document.getElementById('disableBtn'),
        enableBtn: document.getElementById('enableBtn'),
        refreshBtn: document.getElementById('refreshBtn'),
        loadCardsBtn: document.getElementById('loadCardsBtn'),
        cardsList: document.getElementById('cardsList'),
        summaryCardKey: document.getElementById('summaryCardKey'),
        summaryStatus: document.getElementById('summaryStatus'),
        summaryExpireAt: document.getElementById('summaryExpireAt'),
        summaryDevices: document.getElementById('summaryDevices'),
        detailBox: document.getElementById('detailBox'),
        deviceList: document.getElementById('deviceList'),
        loadLogsBtn: document.getElementById('loadLogsBtn'),
        logList: document.getElementById('logList')
      }

      function setMessage(target, text, type = 'notice') {
        target.innerHTML = text ? `<div class="${type}">${text}</div>` : ''
      }

      function formatDate(value) {
        if (!value) return '—'
        const date = new Date(value)
        if (Number.isNaN(date.getTime())) return value
        return date.toLocaleString('zh-CN', { hour12: false })
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            ...(options.body ? { 'content-type': 'application/json' } : {}),
            authorization: `Bearer ${state.token}`,
            ...(options.headers || {})
          }
        })
        const data = await response.json()
        if (!response.ok || data.ok === false) {
          throw new Error(data.message || '请求失败')
        }
        return data
      }

      function renderCards() {
        if (!state.cards.length) {
          els.cardsList.innerHTML = '<div class="empty">还没有卡密</div>'
          return
        }
        els.cardsList.innerHTML = state.cards.map((card) => `
          <div class="item ${card.cardKey === state.selectedCardKey ? 'active' : ''}" data-card-key="${card.cardKey}">
            <div class="item-head">
              <div class="item-title">${card.cardKeyMasked}</div>
              <div class="status ${card.status}">${card.status}</div>
            </div>
            <div class="item-meta">
              <div><span>到期时间</span>${formatDate(card.expireAt)}</div>
              <div><span>设备数</span>${card.activeDeviceCount} / ${card.maxDevices}</div>
              <div><span>备注</span>${card.note || '—'}</div>
            </div>
          </div>
        `).join('')

        for (const item of els.cardsList.querySelectorAll('.item[data-card-key]')) {
          item.addEventListener('click', () => selectCard(item.dataset.cardKey || ''))
        }
      }

      function renderCardDetail(item) {
        els.summaryCardKey.textContent = item?.cardKeyMasked || '未选择'
        els.summaryStatus.textContent = item?.status || '—'
        els.summaryExpireAt.textContent = formatDate(item?.expireAt)
        els.summaryDevices.textContent = item ? `${item.activeDeviceCount} / ${item.maxDevices}` : '—'

        els.detailBox.innerHTML = item ? `
          <div class="muted">卡密</div><div>${item.cardKeyMasked}</div>
          <div class="muted">状态</div><div>${item.status}</div>
          <div class="muted">到期时间</div><div>${formatDate(item.expireAt)}</div>
          <div class="muted">设备数量</div><div>${item.activeDeviceCount} / ${item.maxDevices}</div>
          <div class="muted">创建时间</div><div>${formatDate(item.createdAt)}</div>
          <div class="muted">激活时间</div><div>${formatDate(item.activatedAt)}</div>
          <div class="muted">最近校验</div><div>${formatDate(item.lastValidatedAt)}</div>
          <div class="muted">备注</div><div>${item.note || '—'}</div>
        ` : '<div class="empty" style="grid-column:1/-1">未选择卡密</div>'

        els.deviceList.innerHTML = item?.devices?.length ? item.devices.map((device) => `
          <div class="log-item">
            <div><strong>${device.machine_id}</strong></div>
            <div class="muted" style="margin-top:6px">状态：${device.status}</div>
            <div class="muted">设备名：${device.device_name || '—'}</div>
            <div class="muted">版本：${device.app_version || '—'}</div>
            <div class="muted">首次激活：${formatDate(device.first_activated_at)}</div>
            <div class="muted">最近校验：${formatDate(device.last_validated_at)}</div>
          </div>
        `).join('') : '<div class="empty">暂无设备记录</div>'

        renderLogs(item?.logs || [])
        renderCards()
      }

      function renderLogs(items) {
        els.logList.innerHTML = items.length ? items.map((log) => `
          <div class="log-item">
            <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
              <strong>${log.action}</strong>
              <span class="muted">${formatDate(log.created_at)}</span>
            </div>
            <div class="muted" style="margin-top:6px">结果：${log.result}</div>
            <div class="muted">机器：${log.machine_id || '—'}</div>
            <div style="margin-top:6px">${log.message || '—'}</div>
          </div>
        `).join('') : '<div class="empty">暂无日志</div>'
      }

      async function loadHealth() {
        try {
          const data = await fetch('/health').then((res) => res.json())
          els.healthBadge.textContent = data.usingDefaultAdminToken ? '服务在线 · 默认开发口令' : '服务在线 · 已配置管理口令'
        } catch {
          els.healthBadge.textContent = '服务不可用'
        }
      }

      async function loadCards(selectFirst = false) {
        try {
          const data = await api('/api/admin/cards')
          state.cards = data.items || []
          renderCards()
          if (selectFirst && state.cards[0]) {
            await selectCard(state.cards[0].cardKey)
          } else if (!state.cards.length) {
            renderCardDetail(null)
          }
        } catch (error) {
          setMessage(els.actionMessage, error.message, 'error')
        }
      }

      async function selectCard(cardKey) {
        if (!cardKey) return
        state.selectedCardKey = cardKey
        try {
          const data = await api(`/api/admin/card?cardKey=${encodeURIComponent(cardKey)}`)
          renderCardDetail(data.item)
        } catch (error) {
          setMessage(els.actionMessage, error.message, 'error')
        }
      }

      async function loadLogs() {
        if (!state.selectedCardKey) return
        try {
          const data = await api(`/api/admin/logs?cardKey=${encodeURIComponent(state.selectedCardKey)}&limit=20`)
          renderLogs(data.items || [])
        } catch (error) {
          setMessage(els.actionMessage, error.message, 'error')
        }
      }

      async function verifyToken() {
        state.token = els.adminToken.value.trim()
        localStorage.setItem('license_admin_token', state.token)
        try {
          await api('/api/admin/session')
          setMessage(els.authMessage, '管理员认证成功，现在可以直接创建和管理卡密了。')
          await loadCards(true)
        } catch (error) {
          setMessage(els.authMessage, error.message, 'error')
        }
      }

      async function runAction(path, body, successText) {
        if (!state.selectedCardKey) {
          setMessage(els.actionMessage, '请先从下面列表点一张卡密。', 'error')
          return
        }
        try {
          const data = await api(path, { method: 'POST', body: JSON.stringify(body) })
          setMessage(els.actionMessage, data.message || successText)
          await loadCards()
          await selectCard(state.selectedCardKey)
        } catch (error) {
          setMessage(els.actionMessage, error.message, 'error')
        }
      }

      els.adminToken.value = state.token
      els.saveTokenBtn.addEventListener('click', () => {
        state.token = els.adminToken.value.trim()
        localStorage.setItem('license_admin_token', state.token)
        setMessage(els.authMessage, '管理员口令已保存。')
      })
      els.checkTokenBtn.addEventListener('click', verifyToken)
      els.loadCardsBtn.addEventListener('click', () => loadCards())
      els.loadLogsBtn.addEventListener('click', loadLogs)
      els.refreshBtn.addEventListener('click', () => selectCard(state.selectedCardKey))

      els.createBtn.addEventListener('click', async () => {
        try {
          const data = await api('/api/admin/cards/create', {
            method: 'POST',
            body: JSON.stringify({
              days: Number(els.createDays.value || 30),
              maxDevices: Number(els.createDevices.value || 1),
              note: els.createNote.value.trim()
            })
          })
          setMessage(els.actionMessage, data.message || '卡密创建成功。')
          els.batchResult.value = data.item?.cardKey || ''
          await loadCards(true)
        } catch (error) {
          setMessage(els.actionMessage, error.message, 'error')
        }
      })

      els.batchCreateBtn.addEventListener('click', async () => {
        try {
          const data = await api('/api/admin/cards/batch-create', {
            method: 'POST',
            body: JSON.stringify({
              count: Number(els.batchCount.value || 10),
              days: Number(els.createDays.value || 30),
              maxDevices: Number(els.createDevices.value || 1),
              note: els.createNote.value.trim()
            })
          })
          const keys = (data.items || []).map((item) => item.cardKey).join('\n')
          els.batchResult.value = keys
          setMessage(els.actionMessage, data.message || '批量创建成功。')
          await loadCards(true)
        } catch (error) {
          setMessage(els.actionMessage, error.message, 'error')
        }
      })

      els.disableBtn.addEventListener('click', () => runAction('/api/admin/cards/disable', {
        cardKey: state.selectedCardKey,
        disabled: true,
        note: els.actionNote.value.trim()
      }, '卡密已禁用。'))

      els.enableBtn.addEventListener('click', () => runAction('/api/admin/cards/disable', {
        cardKey: state.selectedCardKey,
        disabled: false,
        note: els.actionNote.value.trim()
      }, '卡密已启用。'))

      els.extendBtn.addEventListener('click', () => runAction('/api/admin/cards/extend', {
        cardKey: state.selectedCardKey,
        days: Number(els.extendDays.value || 30),
        note: els.actionNote.value.trim()
      }, '卡密已延期。'))

      els.resetDevicesBtn.addEventListener('click', () => runAction('/api/admin/cards/reset-devices', {
        cardKey: state.selectedCardKey,
        note: els.actionNote.value.trim()
      }, '设备绑定已重置。'))

      loadHealth()
      verifyToken()
    </script>
  </body>
</html>
